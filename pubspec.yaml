name: pdf_converter
description: PDF ↔ Image Converter — Fast, lightweight, offline PDF and image conversion for Windows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # File picking & drag-drop
  file_picker: ^8.1.2
  desktop_drop: ^0.4.4

  # State management
  provider: ^6.1.2

  # Path utilities
  path_provider: ^2.1.4
  path: ^1.9.0

  # Process/subprocess for Rust integration
  process_run: ^1.2.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3
  reorderable_grid_view: ^2.2.8

  # Shared preferences for settings
  shared_preferences: ^2.3.3

  # Image display
  cached_network_image: ^3.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/id.json
    - assets/i18n/en.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
